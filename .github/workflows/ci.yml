name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Laravel test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          # The container runs 8.4 — the lock file was resolved there.
          # composer.json's ^8.3 is the floor, not the runtime.
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend

      # Identical environment to `make test` — the hermetic set that
      # $_SERVER precedence taught us to inject explicitly.
      - name: Run test suite
        env:
          APP_ENV: testing
          APP_KEY: base64:Hfz0IWxJPfsqqpIFNCCaeF+2nHaqFXGQxpJtkmT+izs=
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          SESSION_DRIVER: array
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # 'build' is `tsc --noEmit && vite build` — strict types are the gate.
      - run: npm run build
