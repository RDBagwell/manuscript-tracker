user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;
    gzip_comp_level 6;
    gzip_disable "msie6";

    # Upstream definitions
    upstream laravel_api {
        server laravel:9000;
    }

    upstream react_app {
        server react:3000;
    }

    # Health check endpoint
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 http://localhost$request_uri;
        }
    }

    # Main application server
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 100M;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # API routes -> Laravel (PHP-FPM speaks FastCGI, not HTTP).
        # SCRIPT_FILENAME points at Laravel's front controller inside the
        # laravel container (WORKDIR /app), and Laravel routes on REQUEST_URI.
        location /api/ {
            fastcgi_pass laravel_api;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /app/public/index.php;
            fastcgi_param SCRIPT_NAME /index.php;
            fastcgi_param DOCUMENT_ROOT /app/public;
            fastcgi_param REQUEST_URI $request_uri;
            fastcgi_param HTTPS $https if_not_empty;
            fastcgi_read_timeout 90;
        }

        # Static Laravel assets (if serving from public)
        location /storage/ {
            alias /app/backend/storage/app/public/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # All other routes -> React
        location / {
            proxy_pass http://react_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # React router support - fallback to index.html
            error_page 404 =200 /index.html;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
